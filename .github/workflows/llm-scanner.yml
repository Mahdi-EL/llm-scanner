name: LLM Scanner Security Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    name: AI Security Scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run LLM Scanner
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python scanner.py \
            --target "CI Security Check" \
            --output "ci_report" \
            --categories direct_override extraction social_engineering boundary_testing

      - name: Check Security Score
        run: |
          python -c "
          import json
          with open('results/ci_report.json') as f:
              data = json.load(f)
          score    = data['summary']['security_score']
          critical = data['summary']['critical']
          print(f'Security Score : {score}%')
          print(f'Critical       : {critical}')
          if critical > 0:
              print('FAILED : Critical vulnerabilities found')
              exit(1)
          elif score < 30:
              print('WARNING : Low security score')
              exit(1)
          else:
              print('PASSED : No critical vulnerabilities')
          "

      - name: Upload Security Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-report
          path: |
            results/ci_report.pdf
            results/ci_report.html
            results/ci_report.json

      - name: Comment PR With Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(
              fs.readFileSync('results/ci_report.json', 'utf8')
            );
            const summary = data.summary;
            const score   = summary.security_score;
            const emoji   = score >= 70 ? '✅' : score >= 40 ? '⚠️' : '🚨';

            const body = `## 🔐 LLM Scanner Security Report

            ${emoji} **Security Score : ${score}%**

            | Severity | Count |
            |---|---|
            | 🚨 Critical | ${summary.critical} |
            | 🔴 High | ${summary.high} |
            | ⚠️ Medium | ${summary.medium} |
            | ✅ Safe | ${summary.safe} |

            ${summary.critical > 0
              ? '❌ **This PR has critical vulnerabilities. Please fix before merging.**'
              : '✅ **No critical vulnerabilities found. Safe to merge.**'
            }

            📄 Download the full report from the Actions artifacts tab.

            *Generated by [LLM Scanner](https://github.com/Mahdi-EL/llm-scanner)*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner       : context.repo.owner,
              repo        : context.repo.repo,
              body        : body
            });
            